<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- macOS-style squircle. Fill matches the main app window background
       (oklch(0.20 0.012 257) ≈ #13161c) so the pill, icon, and main
       window all read as the same surface. -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="#13161c"/>

  <!-- Face (head outline + round glasses), centered in the squircle.
       The same mark renders at small sizes inside the pill — see
       src/pill/Pill.tsx for the gaze-aware variants. -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" transform="translate(512 512)">
    <circle cx="0" cy="0" r="320" stroke-width="26"/>
    <g stroke-width="22">
      <circle cx="-130" cy="0" r="88"/>
      <circle cx="130"  cy="0" r="88"/>
      <line x1="-42" y1="0" x2="42" y2="0"/>
    </g>
  </g>
</svg>
