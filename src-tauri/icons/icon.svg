<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- macOS-style squircle. Fill matches the main app window background
       (oklch(0.20 0.012 257) ≈ #13161c) so the pill, icon, and main
       window all read as the same surface. -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="#13161c"/>

  <!-- Same face/glasses geometry as the pill and sidebar brand mark. -->
  <defs>
    <mask id="head-mask" maskUnits="userSpaceOnUse" x="-50" y="-50" width="100" height="100">
      <rect x="-50" y="-50" width="100" height="100" fill="#ffffff"/>
      <circle cx="-15" cy="0" r="11.5" fill="#000000"/>
      <circle cx="15" cy="0" r="11.5" fill="#000000"/>
    </mask>
  </defs>
  <g fill="none" stroke="#ffffff" stroke-linecap="round" transform="translate(512 512) scale(7)">
    <circle cx="0" cy="0" r="37" stroke-width="3" mask="url(#head-mask)"/>
    <g stroke-width="2.5">
      <circle cx="-15" cy="0" r="8.75" fill="#13161c" stroke="none"/>
      <circle cx="15"  cy="0" r="8.75" fill="#13161c" stroke="none"/>
      <circle cx="-15" cy="0" r="10"/>
      <circle cx="15"  cy="0" r="10"/>
      <line x1="-5" y1="0" x2="5" y2="0"/>
    </g>
  </g>
</svg>
