<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- macOS Big Sur+ icon template: rounded square inset ~100px inside the
       1024 canvas (squircle is 824x824) so we render at the same size as
       sibling apps. Filling the full canvas makes the icon look oversized
       in the dock and Finder relative to other apps. -->
  <rect x="100" y="100" width="824" height="824" rx="186" ry="186" fill="#13161b"/>

  <!-- Same face/glasses geometry as the pill and sidebar brand mark,
       scaled down proportionally with the squircle (≈ 7.95 * 824/1024). -->
  <defs>
    <mask id="head-mask" maskUnits="userSpaceOnUse" x="-50" y="-50" width="100" height="100">
      <rect x="-50" y="-50" width="100" height="100" fill="#ffffff"/>
      <circle cx="-15" cy="0" r="13.5" fill="#000000"/>
      <circle cx="15" cy="0" r="13.5" fill="#000000"/>
    </mask>
  </defs>
  <g transform="translate(512 512) scale(6.4)" fill="none" stroke="#f5f7fb" stroke-linecap="round">
    <circle cx="0" cy="0" r="37" stroke-width="6.5" mask="url(#head-mask)"/>
    <g stroke-width="5.5">
      <circle cx="-15" cy="0" r="8.75" fill="#13161b" stroke="none"/>
      <circle cx="15" cy="0" r="8.75" fill="#13161b" stroke="none"/>
      <circle cx="-15" cy="0" r="10"/>
      <circle cx="15"  cy="0" r="10"/>
      <line x1="-5" y1="0" x2="5" y2="0"/>
    </g>
  </g>
</svg>
