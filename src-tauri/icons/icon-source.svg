<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Full-bleed background. macOS Tahoe applies its own squircle mask in the
       dock; our own inner squircle leaves a transparent gutter that shows the
       OS's light tile behind it as a thin white ring. Filling to the edges
       prevents that. The rx still matches the OS curve closely enough that
       any unmasked corners (Finder list view, etc.) still read as a squircle. -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="#13161b"/>

  <!-- Same face/glasses geometry as the pill and sidebar brand mark. -->
  <defs>
    <mask id="head-mask" maskUnits="userSpaceOnUse" x="-50" y="-50" width="100" height="100">
      <rect x="-50" y="-50" width="100" height="100" fill="#ffffff"/>
      <circle cx="-15" cy="0" r="11.5" fill="#000000"/>
      <circle cx="15" cy="0" r="11.5" fill="#000000"/>
    </mask>
  </defs>
  <g transform="translate(512 512) scale(7)" fill="none" stroke="#f5f7fb" stroke-linecap="round">
    <circle cx="0" cy="0" r="37" stroke-width="3" mask="url(#head-mask)"/>
    <g stroke-width="2.5">
      <circle cx="-15" cy="0" r="8.75" fill="#13161b" stroke="none"/>
      <circle cx="15" cy="0" r="8.75" fill="#13161b" stroke="none"/>
      <circle cx="-15" cy="0" r="10"/>
      <circle cx="15"  cy="0" r="10"/>
      <line x1="-5" y1="0" x2="5" y2="0"/>
    </g>
  </g>
</svg>
