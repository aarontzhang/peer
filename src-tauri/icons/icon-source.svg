<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- macOS-style squircle background in the brand color -->
  <rect x="80" y="80" width="864" height="864" rx="200" ry="200" fill="#13161b"/>

  <!-- Face + round glasses. Geometry matches HistorySidebar.tsx BrandMark
       (viewBox -50 -50 100 100). Centered at (512,512), scaled to fit. -->
  <g transform="translate(512 512) scale(7)" fill="none" stroke="#f5f7fb" stroke-linecap="round">
    <circle cx="0" cy="0" r="37" stroke-width="3"/>
    <g stroke-width="2.5">
      <circle cx="-12" cy="0" r="10"/>
      <circle cx="12"  cy="0" r="10"/>
      <line x1="-3" y1="0" x2="3" y2="0"/>
    </g>
  </g>
</svg>
