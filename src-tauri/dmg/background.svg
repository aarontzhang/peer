<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <!--
    DMG installer background.
    Window size: 660 x 400
    App icon center:           (165, 205)  -> reserved square ~128x128 around it
    Applications folder center:(495, 205)  -> reserved square ~128x128 around it
    Finder places Peer.app and the Applications shortcut below the copy.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f8fb"/>
    </linearGradient>
    <radialGradient id="aurora" cx="50%" cy="35%" r="60%">
      <stop offset="0%"  stop-color="#8ec5ff" stop-opacity="0.11"/>
      <stop offset="62%" stop-color="#8ec5ff" stop-opacity="0.00"/>
    </radialGradient>
  </defs>

  <rect width="660" height="400" fill="url(#bg)"/>
  <rect width="660" height="400" fill="url(#aurora)"/>

  <!-- Headline -->
  <text x="330" y="64"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22"
        font-weight="600"
        letter-spacing="-0.3"
        fill="#15191f">Install Peer</text>

  <text x="330" y="92"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="13"
        fill="#626a78">Drag Peer into your Applications folder</text>
</svg>
